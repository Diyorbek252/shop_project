<!-- templates/registration/login.html -->
{% load static %}
<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kirish</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="{% static 'users/css/login.css' %}" rel="stylesheet">
</head>
<body>
    <div class="login-card">
        <h2>Tizimga kirish</h2>

        {% if messages %}
            {% for message in messages %}
                <div class="alert {% if message.tags %}alert-{{ message.tags }}{% else %}alert-danger{% endif %} text-center" role="alert">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        <form method="post" action="{% url 'users:login' %}">
            {% csrf_token %}

            <div class="mb-3">
                <label for="id_username" class="form-label">Foydalanuvchi nomi</label>
                <input type="text" name="username" class="form-control" id="id_username" placeholder="Loginingizni kiriting" required autofocus>
            </div>

            <div class="mb-3">
                <label for="id_password" class="form-label">Parol</label>
                <input type="password" name="password" class="form-control" id="id_password" placeholder="Parolingizni kiriting" required>
            </div>

            <input type="hidden" name="next" value="{{ next }}">

            <button type="submit" class="btn-login mt-2">Kirish</button>
        </form>

        <div class="extra-links">
            {% comment %} <a href="{% url 'users:password_reset' %}">Parolni unutdingizmi?</a> {% endcomment %}
            <br>
            <span>Akkountingiz yo'qmi? <a href="{% url 'users:register' %}">Ro'yxatdan o'tish</a></span>
        </div> 
    </div>
</body>
</html>
